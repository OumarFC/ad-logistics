{% extends "administration/base_admin.html" %}
{% block title %}Modifier paramètre{% endblock %}

{% block admin_content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card">
            <div class="card-header bg-white">
                <h4 class="mb-0">Modifier un paramètre</h4>
            </div>
            <div class="card-body">
                <div class="mb-3">
                    <label class="form-label">Paramètre</label>
                    <input type="text" class="form-control" value="{{ parametre.libelle }}" disabled>
                </div>

                <div class="mb-3">
                    <label class="form-label">Clé</label>
                    <input type="text" class="form-control" value="{{ parametre.cle }}" disabled>
                </div>

                <div class="mb-3">
                    <label class="form-label">Type</label>
                    <input type="text" class="form-control" value="{{ parametre.get_type_valeur_display }}" disabled>
                </div>

                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label">Entreprise cliente</label>
                        {{ form.entreprise }}
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Valeur</label>
                        {{ form.valeur }}
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="{% url 'admin_liste_parametres' %}" class="btn btn-secondary">
                            Retour
                        </a>
                        <button type="submit" class="btn btn-primary">
                            Enregistrer
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
