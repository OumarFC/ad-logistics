{% extends "base.html" %}
{% block title %}Éditer colis {{ kind }}{% endblock %}
{% block content %}
<div class="container section">
  <h2>Éditer colis {{ kind }} — {{ obj.reference }}</h2>
  <form class="form-grid" method="post">
    {% csrf_token %}
    {% for field in form %}
      <label>{{ field.label }} {{ field }}</label>
      {% if field.errors %}<div class="error">{{ field.errors }}</div>{% endif %}
    {% endfor %}
    <div class="form-actions">
      <button class="btn">Enregistrer</button>
      <a class="btn ghost" href="/app/#recherche">Annuler</a>
    </div>
  </form>
</div>
{% endblock %}
